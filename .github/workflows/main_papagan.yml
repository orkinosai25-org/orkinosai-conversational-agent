# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
#
# Required GitHub Secret:
#   PUBLISH_PROFILE — Azure App Service publish profile for the site-chat-agent CMS
#                     (download from Azure Portal: App Service > Overview > Get publish profile)

name: Build and deploy ASP.Net Core app to Azure Web App - site-chat-agent

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Build job - compiles and publishes the .NET application
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build src/cms/PapaganCMS.sln --configuration Release

      - name: Publish with dotnet
        run: dotnet publish src/cms/Server/PapaganCMS.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  # Deploy job - deploys the published application to Azure using publish profile
  deploy:
    runs-on: windows-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      # Validate that the required publish profile secret is set before attempting deployment
      - name: Validate publish profile secret
        shell: pwsh
        env:
          PUBLISH_PROFILE: ${{ secrets.PUBLISH_PROFILE }}
        run: |
          if ([string]::IsNullOrEmpty($env:PUBLISH_PROFILE)) {
            Write-Error "Required secret 'PUBLISH_PROFILE' is not set. Download the publish profile from Azure Portal (App Service 'site-chat-agent' > Overview > Get publish profile) and add it as a repository secret named PUBLISH_PROFILE (Settings > Secrets and variables > Actions). See docs/AZURE_DEPLOYMENT.md for full instructions."
            exit 1
          }

      # Deploy to Azure Web App using the PUBLISH_PROFILE secret
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'site-chat-agent'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.PUBLISH_PROFILE }}
          startup-command: 'dotnet PapaganCMS.dll'
