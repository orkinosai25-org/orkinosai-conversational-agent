# Workflow refactored to match the working MOSAIC deployment template (deploy.yml, commit cd4e492)
# This follows the proven Azure Web App deployment pattern using publish profiles
# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - papagan

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Build job - compiles and publishes the .NET application
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build src/cms/PapaganCMS.sln --configuration Release

      - name: Publish with dotnet
        run: dotnet publish src/cms/Server/PapaganCMS.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  # Deploy job - deploys the published application to Azure using publish profile
  # This matches the MOSAIC workflow pattern: separate build/deploy jobs with publish profile authentication
  deploy:
    runs-on: windows-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      # Deploy to Azure Web App using publish profile
      # Using v3 which properly supports publish-profile without requiring Azure login
      # The WEB-APP-PUBLISH-PROFILE-PAPAGAN secret should contain the publish profile XML from Azure Portal
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'papagan'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.WEB-APP-PUBLISH-PROFILE-PAPAGAN }}

          