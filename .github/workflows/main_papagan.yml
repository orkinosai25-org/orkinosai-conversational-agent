# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
#
# Required GitHub Secret:
#   PUBLISH_PROFILE — Azure App Service publish profile for the site-chat-agent CMS
#                     (download from Azure Portal: App Service > Overview > Get publish profile)

name: Build and deploy ASP.Net Core app to Azure Web App - site-chat-agent

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Build job - compiles and publishes the .NET application
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build src/cms/PapaganCMS.sln --configuration Release

      - name: Publish with dotnet
        run: dotnet publish src/cms/Server/PapaganCMS.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Verify single runtimeconfig for unambiguous Azure startup detection
        shell: pwsh
        run: |
          # Azure App Service (Oryx) requires exactly ONE .runtimeconfig.json in the
          # publish output to auto-detect the startup DLL.  The Server csproj excludes
          # PapaganCMS.Client.runtimeconfig.json at publish time via an MSBuild target;
          # this step confirms the invariant holds before the artifact is uploaded.
          $publishDir = "${{env.DOTNET_ROOT}}/myapp"
          $configs = Get-ChildItem $publishDir -Filter "*.runtimeconfig.json"
          Write-Host "runtimeconfig.json files in publish output ($($configs.Count)):"
          $configs | ForEach-Object { Write-Host "  - $($_.Name)" }
          if ($configs.Count -ne 1) {
            Write-Error "Expected exactly one .runtimeconfig.json in publish output but found $($configs.Count). Oryx cannot auto-detect the startup DLL when multiple exist — it falls back to hostingstart.dll."
            exit 1
          }
          if ($configs[0].Name -ne 'PapaganCMS.runtimeconfig.json') {
            Write-Error "Expected 'PapaganCMS.runtimeconfig.json' but found '$($configs[0].Name)'. Ensure only the Server project is published."
            exit 1
          }
          Write-Host "OK: publish output contains exactly 'PapaganCMS.runtimeconfig.json'"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  # Migrate job — applies EF Core migrations to Azure SQL before the new app code goes live.
  # Runs on ubuntu-latest so the dotnet-ef tool can connect directly to Azure SQL.
  # Skipped gracefully when SQL_CONNECTION_STRING is not configured (e.g. first-time
  # setup before infra is provisioned — use azure-provision.yml for that).
  #
  # Required GitHub Secret (optional — workflow degrades gracefully if absent):
  #   SQL_CONNECTION_STRING — full ADO.NET connection string for Azure SQL
  #                           (set via Settings > Secrets and variables > Actions)
  migrate:
    name: Apply EF Core Migrations
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Check SQL_CONNECTION_STRING secret
        id: check-secret
        shell: bash
        env:
          SQL_CONNECTION_STRING: ${{ secrets.SQL_CONNECTION_STRING }}
        run: |
          if [ -z "$SQL_CONNECTION_STRING" ]; then
            echo "⚠️  SQL_CONNECTION_STRING secret is not set — skipping migrations." >> "$GITHUB_STEP_SUMMARY"
            echo "   Add the Azure SQL connection string as a repository secret to enable" >> "$GITHUB_STEP_SUMMARY"
            echo "   automatic migrations on deploy (Settings → Secrets and variables → Actions)." >> "$GITHUB_STEP_SUMMARY"
            echo "   Alternatively, run the 'Provision Azure Infrastructure (Full)' workflow" >> "$GITHUB_STEP_SUMMARY"
            echo "   which provisions infra and migrates in a single operation." >> "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dotnet-ef tool
        if: steps.check-secret.outputs.skip == 'false'
        run: dotnet tool install --global dotnet-ef

      - name: Restore packages
        if: steps.check-secret.outputs.skip == 'false'
        run: dotnet restore src/cms/Server/PapaganCMS.csproj

      - name: Build project (required for dotnet-ef to locate DbContext)
        if: steps.check-secret.outputs.skip == 'false'
        run: dotnet build src/cms/Server/PapaganCMS.csproj --no-restore --configuration Release

      - name: Apply EF Core migrations
        if: steps.check-secret.outputs.skip == 'false'
        run: dotnet ef database update --project src/cms/Server/PapaganCMS.csproj --no-build
        env:
          # The ApplicationDbContextDesignTimeFactory reads the CONNECTIONSTRINGS__DEFAULT
          # environment variable. SQL_CONNECTION_STRING is the GitHub secret name; it is
          # mapped here to the correct env var name that the factory expects.
          CONNECTIONSTRINGS__DEFAULT: ${{ secrets.SQL_CONNECTION_STRING }}

      - name: Report migration result
        if: steps.check-secret.outputs.skip == 'false'
        run: echo "✅ EF Core migrations applied successfully." >> "$GITHUB_STEP_SUMMARY"

  # Deploy job - deploys the published application to Azure using publish profile
  deploy:
    runs-on: windows-latest
    needs: migrate
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish

      # Validate that the required publish profile secret is set before attempting deployment
      - name: Validate publish profile secret
        shell: pwsh
        env:
          PUBLISH_PROFILE: ${{ secrets.PUBLISH_PROFILE }}
        run: |
          if ([string]::IsNullOrEmpty($env:PUBLISH_PROFILE)) {
            Write-Error "Required secret 'PUBLISH_PROFILE' is not set. Download the publish profile from Azure Portal (App Service 'site-chat-agent' > Overview > Get publish profile) and add it as a repository secret named PUBLISH_PROFILE (Settings > Secrets and variables > Actions). See docs/AZURE_DEPLOYMENT.md for full instructions."
            exit 1
          }

      # Deploy to Azure Web App using the PUBLISH_PROFILE secret.
      # Note: startup-command is not supported with publish-profile auth scheme.
      # The Server csproj excludes PapaganCMS.Client.runtimeconfig.json at publish time
      # so Oryx auto-detects PapaganCMS.dll as the sole startup file.
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'site-chat-agent'
          slot-name: 'Production'
          package: ./publish
          publish-profile: ${{ secrets.PUBLISH_PROFILE }}
