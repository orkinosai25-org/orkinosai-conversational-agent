# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions
#
# Required GitHub Secret:
#   AGENT_PUBLISH_PROFILE — Azure App Service publish profile for site-chat-agent
#                           (download from Azure Portal: App Service > Overview > Get publish profile)
#
# Required Azure App Service environment variables (set in Azure Portal > App Service > Configuration):
#   AZURE_AI_API_KEY          — Azure OpenAI API key
#   AZURE_AI_ENDPOINT         — Azure OpenAI endpoint URL
#   AZURE_OPENAI_API_VERSION  — Azure OpenAI API version (e.g. 2024-08-01-preview)
#   AZURE_OPENAI_DEPLOYMENT   — Azure OpenAI model deployment name

name: Build and deploy Python app to Azure Web App - site-chat-agent

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🛠️ Local Build Section (Optional)
      # The following section in your workflow is designed to catch build issues early on the client side, before deployment. This can be helpful for debugging and validation. However, if this step significantly increases deployment time and early detection is not critical for your workflow, you may remove this section to streamline the deployment process.
      - name: Create and start virtual environment and install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
                
      # By default, when you enable GitHub CI/CD integration through the Azure portal, the platform automatically sets the SCM_DO_BUILD_DURING_DEPLOYMENT application setting to true. This triggers the use of Oryx, a build engine that handles application compilation and dependency installation (e.g., pip install) directly on the platform during deployment. Hence, we exclude the antenv virtual environment directory from the deployment artifact to reduce the payload size. 
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

      # 🚫 Opting Out of Oryx Build
      # If you prefer to disable the Oryx build process during deployment, follow these steps:
      # 1. Remove the SCM_DO_BUILD_DURING_DEPLOYMENT app setting from your Azure App Service Environment variables.
      # 2. Refer to sample workflows for alternative deployment strategies: https://github.com/Azure/actions-workflow-samples/tree/master/AppService
      

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      # Validate that the required publish profile secret is set before attempting deployment
      - name: Validate publish profile secret
        env:
          PUBLISH_PROFILE: ${{ secrets.AGENT_PUBLISH_PROFILE }}
        run: |
          if [ -z "$PUBLISH_PROFILE" ]; then
            echo "::error::Required secret 'AGENT_PUBLISH_PROFILE' is not set. Download the publish profile from Azure Portal (App Service 'site-chat-agent' > Overview > Get publish profile) and add it as a repository secret named AGENT_PUBLISH_PROFILE (Settings > Secrets and variables > Actions). See docs/AZURE_DEPLOYMENT.md for full instructions."
            exit 1
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'site-chat-agent'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AGENT_PUBLISH_PROFILE }}
          startup-command: 'gunicorn --bind=0.0.0.0 --timeout 600 wsgi:app'
