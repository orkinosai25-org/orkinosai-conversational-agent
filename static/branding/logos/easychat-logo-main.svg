<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <!-- EasyChat Main Logo: icon + wordmark -->

  <!-- Icon: chat bubble -->
  <rect x="20" y="60" width="200" height="140" rx="28" ry="28" fill="#2563EB"/>
  <!-- Bubble tail -->
  <path d="M 50 200 L 32 250 L 100 200 Z" fill="#2563EB"/>
  <!-- Three dots -->
  <circle cx="90" cy="130" r="14" fill="#ffffff"/>
  <circle cx="120" cy="130" r="14" fill="#14B8A6"/>
  <circle cx="150" cy="130" r="14" fill="#ffffff"/>

  <!-- Wordmark: EasyChat -->
  <text x="250" y="168" font-family="'Segoe UI', 'Arial', sans-serif" font-size="80" font-weight="700" fill="#2563EB">EasyChat</text>

  <!-- Tagline -->
  <text x="252" y="210" font-family="'Segoe UI', 'Arial', sans-serif" font-size="26" font-weight="400" fill="#14B8A6">AI chat for your website</text>
</svg>
