<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <!-- Background -->
  <rect width="300" height="80" fill="#0078D4" rx="4"/>
  
  <!-- Microsoft Logo (4 squares) -->
  <rect x="15" y="20" width="16" height="16" fill="#F25022"/>
  <rect x="33" y="20" width="16" height="16" fill="#7FBA00"/>
  <rect x="15" y="38" width="16" height="16" fill="#00A4EF"/>
  <rect x="33" y="38" width="16" height="16" fill="#FFB900"/>
  
  <!-- Text -->
  <text x="60" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="white">
    Microsoft for Startups
  </text>
  <text x="60" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="400" fill="white" opacity="0.9">
    Founders Hub Member
  </text>
</svg>