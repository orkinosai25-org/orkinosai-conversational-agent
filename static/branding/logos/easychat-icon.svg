<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- EasyChat Icon: flat chat bubble with three dots -->
  <!-- Primary bubble -->
  <rect x="30" y="50" width="220" height="160" rx="32" ry="32" fill="#2563EB"/>
  <!-- Tail of the bubble -->
  <path d="M 60 210 L 40 260 L 110 210 Z" fill="#2563EB"/>
  <!-- Three dots (typing indicator) -->
  <circle cx="110" cy="130" r="16" fill="#ffffff"/>
  <circle cx="150" cy="130" r="16" fill="#14B8A6"/>
  <circle cx="190" cy="130" r="16" fill="#ffffff"/>
</svg>
