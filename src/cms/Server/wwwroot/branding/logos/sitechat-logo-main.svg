<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="sc-main-bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sc-main-dotGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097A7;stop-opacity:1" />
    </linearGradient>
    <filter id="sc-main-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <!-- Chat bubble icon (left side) -->
  <rect x="20" y="48" width="210" height="160" rx="32" ry="32"
        fill="url(#sc-main-bubbleGrad)" filter="url(#sc-main-shadow)"/>

  <!-- Bubble tail -->
  <path d="M 52 208 L 30 268 L 108 208 Z" fill="url(#sc-main-bubbleGrad)"/>

  <!-- Typing dots -->
  <circle cx="95"  cy="128" r="17" fill="#ffffff"/>
  <circle cx="125" cy="128" r="17" fill="url(#sc-main-dotGrad)"/>
  <circle cx="155" cy="128" r="17" fill="#FFC107"/>

  <!-- Wordmark: SiteChat -->
  <text x="260" y="168"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="86" font-weight="700" fill="#2E7D32">SiteChat</text>

  <!-- Sub-word: Agent -->
  <text x="262" y="218"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="36" font-weight="400" fill="#00838F"
        font-style="italic">Agent</text>

  <!-- Tagline dot accent -->
  <circle cx="248" cy="175" r="6" fill="#FFC107"/>
</svg>
