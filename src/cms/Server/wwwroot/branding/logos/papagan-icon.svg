<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wingGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097A7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="beakGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Parrot Character (centered and scaled) -->
  <g transform="translate(150, 150) scale(1.2)">
    <!-- Tail feathers -->
    <path d="M 0 70 Q -20 120, -30 160 Q -15 140, 0 130 Z" fill="#FF5722"/>
    <path d="M 0 70 Q 0 130, 0 170 Q 0 140, 0 130 Z" fill="#FF9800"/>
    <path d="M 0 70 Q 20 120, 30 160 Q 15 140, 0 130 Z" fill="#FFEB3B"/>
    
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="55" ry="70" fill="url(#bodyGradient)"/>
    
    <!-- Wings -->
    <ellipse cx="-40" cy="0" rx="32" ry="56" fill="url(#wingGradient)" transform="rotate(-20 -40 0)"/>
    <ellipse cx="40" cy="0" rx="32" ry="56" fill="url(#wingGradient)" transform="rotate(20 40 0)"/>
    
    <!-- Head -->
    <circle cx="0" cy="-60" r="44" fill="url(#bodyGradient)"/>
    
    <!-- Crest feathers -->
    <path d="M -25 -100 Q -30 -115, -25 -125" stroke="#FF5722" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M -15 -105 Q -15 -120, -10 -130" stroke="#FF9800" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M -5 -108 Q 0 -123, 5 -133" stroke="#FFEB3B" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Beak -->
    <path d="M 20 -60 Q 55 -60, 60 -55 Q 55 -50, 20 -50 Z" fill="url(#beakGradient)"/>
    <path d="M 20 -60 L 60 -55 L 20 -50 Z" fill="#FF6F00" opacity="0.3"/>
    
    <!-- Eye -->
    <circle cx="8" cy="-75" r="10" fill="white"/>
    <circle cx="8" cy="-75" r="6" fill="#212121"/>
    <circle cx="11" cy="-78" r="2.5" fill="white"/>
    <circle cx="13" cy="-80" r="1.2" fill="white"/>
    
    <!-- Cheek spot (blush) -->
    <ellipse cx="-15" cy="-55" rx="6" ry="5" fill="#FF4081" opacity="0.4"/>
    
    <!-- Feet -->
    <path d="M -20 85 L -20 100 M -25 100 L -15 100" stroke="#FF6F00" stroke-width="3" stroke-linecap="round"/>
    <path d="M 20 85 L 20 100 M 15 100 L 25 100" stroke="#FF6F00" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Small chat bubble -->
    <g transform="translate(70, -80)">
      <ellipse cx="0" cy="0" rx="18" ry="13" fill="#00BCD4" opacity="0.9"/>
      <path d="M -10 8 L -13 15 L -7 10 Z" fill="#00BCD4" opacity="0.9"/>
      <circle cx="-5" cy="0" r="2" fill="white"/>
      <circle cx="0" cy="0" r="2" fill="white"/>
      <circle cx="5" cy="0" r="2" fill="white"/>
    </g>
  </g>
</svg>
